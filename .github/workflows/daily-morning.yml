name: Daily Morning Analysis

on:
  schedule:
    # 8:30 AM IST = 03:00 UTC
    - cron: "0 3 * * 1-5"
  workflow_dispatch:

env:
  FYERS__APP_ID: ${{ secrets.FYERS_APP_ID }}
  FYERS__CLIENT_ID: ${{ secrets.FYERS_CLIENT_ID }}
  FYERS__SECRET_KEY: ${{ secrets.FYERS_SECRET_KEY }}
  FYERS__PIN: ${{ secrets.FYERS_PIN }}
  FYERS__TOTP_KEY: ${{ secrets.FYERS_TOTP_KEY }}
  DISCORD__WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
  TELEGRAM__BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

jobs:
  morning-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check market status
        id: market-check
        run: |
          python -c "
          from quant.calendar.holiday_checker import HolidayChecker
          from quant.utils.exceptions import MarketClosedError
          from datetime import date
          import sys

          try:
              checker = HolidayChecker()
              today = date.today()
              if not checker.is_trading_day(today):
                  holiday_name = checker.get_holiday_name(today) or 'Holiday/Weekend'
                  raise MarketClosedError('NSE')
              print('Market check passed — proceeding with morning scan')
          except MarketClosedError as e:
              print(f'Skipping: {e} ({holiday_name if \"holiday_name\" in dir() else \"closed\"})')
              sys.exit(0)
          except Exception as e:
              print(f'Market check failed ({e}), proceeding anyway')
          "

      - name: Run morning strategy scan
        run: pivotpoint scan

      - name: Summary
        if: always()
        run: echo "Morning scan completed at $(TZ=Asia/Kolkata date '+%Y-%m-%d %H:%M IST')"

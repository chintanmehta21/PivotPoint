name: Daily Morning Analysis

on:
  schedule:
    # 8:30 AM IST = 03:00 UTC
    - cron: "0 3 * * 1-5"
  workflow_dispatch:

env:
  FYERS_APP_ID: ${{ secrets.FYERS_APP_ID }}
  FYERS_SECRET_KEY: ${{ secrets.FYERS_SECRET_KEY }}
  FYERS_REDIRECT_URI: ${{ secrets.FYERS_REDIRECT_URI }}
  FYERS_PIN: ${{ secrets.FYERS_PIN }}
  DISCORD__BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
  TELEGRAM__BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

jobs:
  morning-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check market status
        id: market-check
        run: |
          python -c "
          from quant.data.fyers.client import FyersClient
          from quant.utils.exceptions import MarketClosedError
          import sys
          try:
              # If market is closed/holiday, exit gracefully
              print('Market check passed — proceeding with morning scan')
          except MarketClosedError as e:
              print(f'Skipping: {e}')
              sys.exit(0)
          "

      - name: Run morning strategy scan
        run: pivotpoint scan

      - name: Summary
        if: always()
        run: echo "Morning scan completed at $(TZ=Asia/Kolkata date '+%Y-%m-%d %H:%M IST')"

name: PivotPoint Evening Report

on:
  schedule:
    - cron: '30 10 * * 1-5'
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FYERS__APP_ID: ${{ secrets.FYERS_APP_ID }}
      FYERS__CLIENT_ID: ${{ secrets.FYERS_CLIENT_ID }}
      FYERS__SECRET_KEY: ${{ secrets.FYERS_SECRET_KEY }}
      FYERS__PIN: ${{ secrets.FYERS_PIN }}
      FYERS__TOTP_KEY: ${{ secrets.FYERS_TOTP_KEY }}
      DISCORD__WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      TELEGRAM__BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM__CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -e .
      - run: pivotpoint report --type evening
